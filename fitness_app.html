<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="課程管理">
<title>健身課程管理 🌸</title>
<style>
:root {
  --pink: #FF8FAB;
  --pink-light: #FFB3C6;
  --pink-pale: #FFF0F3;
  --pink-mid: #FFCCD5;
  --peach: #FFB347;
  --peach-pale: #FFF4E6;
  --lavender: #C8A2C8;
  --lavender-pale: #F3EEFF;
  --mint: #98D8C8;
  --mint-pale: #E8FAF5;
  --yellow-pale: #FFFBE6;
  --bg: #FFF5F7;
  --bg2: #FFE8EE;
  --bg3: #FFD6E0;
  --white: #FFFFFF;
  --text: #5C3D4E;
  --text2: #9C7A87;
  --text3: #C4A0AF;
  --border: rgba(255,143,171,0.25);
  --border2: rgba(255,143,171,0.45);
  --radius: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --shadow: 0 2px 12px rgba(255,143,171,0.15);
  --shadow-sm: 0 1px 6px rgba(255,143,171,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }
input, textarea, select, button { font-family: inherit; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--pink-light); border-radius: 4px; }

.app { max-width: 600px; margin: 0 auto; min-height: 100vh; }

/* Header */
.header { background: linear-gradient(135deg, #FF8FAB 0%, #FFB3C6 100%); padding: env(safe-area-inset-top, 44px) 16px 0; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 16px rgba(255,143,171,0.3); }
.header-title { font-size: 18px; font-weight: 700; color: white; text-align: center; padding: 12px 0 0; letter-spacing: 1px; text-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.header-subtitle { font-size: 11px; color: rgba(255,255,255,0.85); text-align: center; margin-top: 2px; }
.tab-bar { display: flex; gap: 0; margin-top: 10px; overflow-x: auto; }
.tab-bar::-webkit-scrollbar { display: none; }
.tab { flex: 1; padding: 10px 6px; font-size: 12px; cursor: pointer; border: none; background: none; color: rgba(255,255,255,0.75); border-bottom: 3px solid transparent; text-align: center; white-space: nowrap; min-width: 60px; }
.tab.active { color: white; border-bottom-color: white; font-weight: 600; }

/* Content */
.content { padding: 16px; padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px)); }

/* Cards */
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
.card-pink { background: linear-gradient(135deg, #FFF0F3 0%, #FFE8EE 100%); border-color: var(--pink-light); }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.stat-card { background: var(--white); border-radius: var(--radius); padding: 10px 8px; text-align: center; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
.stat-label { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
.stat-num { font-size: 22px; font-weight: 700; color: var(--pink); }
.stat-num.warn { color: var(--peach); }
.stat-num.danger { color: #FF6B8A; }

/* Alerts */
.alert { border-radius: var(--radius); padding: 10px 14px; margin-bottom: 10px; }
.alert-warn { background: var(--peach-pale); border: 1px solid #FFD08A; }
.alert-danger { background: #FFF0F3; border: 1px solid var(--pink-light); }
.alert-mint { background: var(--mint-pale); border: 1px solid var(--mint); }
.alert-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.alert-warn .alert-title { color: #B87800; }
.alert-danger .alert-title { color: #CC3355; }
.alert-mint .alert-title { color: #2D8B72; }
.alert-item { font-size: 12px; padding: 1px 0; display: flex; gap: 6px; }
.alert-warn .alert-item { color: #8B5E00; }
.alert-danger .alert-item { color: #AA2244; }
.alert-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.alert-warn .alert-dot { background: #FFB347; }
.alert-danger .alert-dot { background: var(--pink); }

/* Section title */
.section-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.section-title::before { content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, var(--pink) 0%, var(--pink-light) 100%); border-radius: 2px; flex-shrink: 0; }

/* Badges */
.badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
.badge-ok { background: var(--mint-pale); color: #2D8B72; border: 1px solid var(--mint); }
.badge-warn { background: var(--peach-pale); color: #8B5E00; border: 1px solid #FFD08A; }
.badge-danger { background: #FFF0F3; color: #CC3355; border: 1px solid var(--pink-light); }

/* Buttons */
.btn { padding: 9px 16px; font-size: 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--white); color: var(--text); font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn:active { transform: scale(0.97); opacity: 0.85; }
.btn-primary { background: linear-gradient(135deg, var(--pink) 0%, var(--pink-light) 100%); color: white; border-color: var(--pink); box-shadow: 0 2px 8px rgba(255,143,171,0.35); }
.btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 10px; }
.btn-warn { background: var(--peach-pale); color: #8B5E00; border-color: #FFD08A; }
.btn-blue { background: var(--lavender-pale); color: #6B44A0; border-color: var(--lavender); }
.btn-red { background: #FFF0F3; color: #CC3355; border-color: var(--pink-light); }
.btn-mint { background: var(--mint-pale); color: #2D8B72; border-color: var(--mint); }
.btn-ghost { background: transparent; color: var(--text2); border-color: var(--border); }

/* Chips */
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.chip { padding: 6px 14px; font-size: 12px; border-radius: 20px; border: 1px solid var(--border2); cursor: pointer; background: var(--white); color: var(--text2); white-space: nowrap; font-weight: 500; }

/* Avatar */
.avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; border: 2px solid var(--white); box-shadow: var(--shadow-sm); }

/* Check items */
.check-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 11px 0; border-bottom: 1px dashed var(--border); gap: 8px; }
.check-item:last-child { border-bottom: none; }
.check-item.low-bg { background: var(--peach-pale); border-radius: var(--radius); padding: 10px 10px; margin: 2px -10px; border-bottom: none; }
.check-item.excused-bg { background: var(--lavender-pale); border-radius: var(--radius); padding: 10px 10px; margin: 2px -10px; border-bottom: none; }
.check-item.unexcused-bg { background: #FFF0F3; border-radius: var(--radius); padding: 10px 10px; margin: 2px -10px; border-bottom: none; }
.check-actions { display: flex; gap: 5px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; max-width: 200px; }

/* Tags */
.note-tag { font-size: 11px; color: #6B44A0; background: var(--lavender-pale); padding: 2px 8px; border-radius: 10px; margin-top: 3px; display: inline-block; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border: 1px solid var(--lavender); }
.time-tag { font-size: 11px; color: var(--text2); background: var(--bg2); padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.absent-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; font-weight: 500; }
.absent-excused { background: var(--lavender-pale); color: #6B44A0; border: 1px solid var(--lavender); }
.absent-unexcused { background: #FFF0F3; color: #CC3355; border: 1px solid var(--pink-light); }
.warn-inline { font-size: 10px; color: #8B5E00; background: var(--peach-pale); padding: 2px 6px; border-radius: 8px; border: 1px solid #FFD08A; }
.expire-inline { font-size: 10px; color: #CC3355; background: #FFF0F3; padding: 2px 6px; border-radius: 8px; }
.join-dur { font-size: 11px; color: #2D8B72; background: var(--mint-pale); padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 2px; border: 1px solid var(--mint); }

/* Student row */
.student-row { display: flex; align-items: flex-start; gap: 10px; padding: 11px 0; border-bottom: 1px dashed var(--border); }
.student-row:last-child { border-bottom: none; }

/* History */
.hist-item { padding: 9px 0; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.hist-item:last-child { border-bottom: none; }

/* Class section header */
.cls-hd { display: flex; align-items: center; gap: 8px; padding: 8px 0 6px; border-bottom: 1px solid var(--border2); margin-bottom: 6px; font-size: 13px; font-weight: 700; color: var(--text); }

/* Empty state */
.empty { text-align: center; padding: 2.5rem 1rem; color: var(--text2); font-size: 14px; }
.empty-icon { font-size: 36px; margin-bottom: 8px; }

/* Forms */
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 600; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; font-size: 14px; padding: 10px 13px; border-radius: var(--radius);
  border: 1.5px solid var(--border2); background: var(--bg); color: var(--text);
  outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--pink); background: var(--white); }
.form-group textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.expire-hint { font-size: 11px; color: #2D8B72; margin-top: 4px; font-weight: 500; }

/* Overlay + modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(92,61,78,0.4); z-index: 200; overflow-y: auto; padding: 1rem; backdrop-filter: blur(4px); }
.overlay.open { display: block; }
.modal { background: var(--white); border-radius: var(--radius-xl); padding: 20px; width: 100%; max-width: 500px; margin: auto; margin-top: env(safe-area-inset-top, 16px); box-shadow: 0 8px 32px rgba(255,143,171,0.25); border: 1px solid var(--border); }
.modal-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
.modal-footer { display: flex; gap: 8px; margin-top: 16px; }
.modal-footer .btn { flex: 1; text-align: center; }

/* Confirm card */
.confirm-card { background: var(--white); border-radius: 20px; padding: 28px 22px; max-width: 360px; margin: auto; margin-top: env(safe-area-inset-top, 16px); text-align: center; box-shadow: 0 8px 32px rgba(255,143,171,0.25); border: 1px solid var(--border); }

/* Toast */
#toast { position: fixed; bottom: calc(28px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%); padding: 11px 22px; border-radius: 20px; font-size: 14px; z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 88vw; text-align: center; font-weight: 500; }
#toast.show { opacity: 1; }
.tn { background: linear-gradient(135deg, var(--pink) 0%, var(--pink-light) 100%); color: white; box-shadow: 0 4px 16px rgba(255,143,171,0.4); }
.tw { background: linear-gradient(135deg, var(--peach) 0%, #FFD08A 100%); color: white; }
.td { background: linear-gradient(135deg, #FF6B8A 0%, var(--pink) 100%); color: white; }

/* FAB */
.fab { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom,0px)); right: 20px; width: 54px; height: 54px; border-radius: 50%; background: linear-gradient(135deg, var(--pink) 0%, var(--pink-light) 100%); color: white; font-size: 26px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(255,143,171,0.5); z-index: 40; border: none; cursor: pointer; }

/* Decorative */
.deco-title { font-size: 20px; font-weight: 800; color: var(--pink); text-align: center; padding: 8px 0 4px; letter-spacing: 2px; }

/* Class management */
.class-card { background: var(--white); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
.class-card-header { display: flex; align-items: center; justify-content: space-between; }
.weekday-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 10px 0; }
.weekday-btn { padding: 6px 2px; font-size: 12px; border-radius: 8px; border: 1.5px solid var(--border2); background: var(--white); color: var(--text2); cursor: pointer; text-align: center; font-weight: 600; }
.weekday-btn.active { background: var(--pink); color: white; border-color: var(--pink); }
.schedule-list { max-height: 180px; overflow-y: auto; }
.schedule-date-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 8px; margin-bottom: 4px; font-size: 13px; }
.schedule-date-item.normal { background: var(--pink-pale); color: var(--text); }
.schedule-date-item.cancelled { background: var(--bg3); color: var(--text2); text-decoration: line-through; }
.schedule-date-item .course-tag { font-size: 10px; background: var(--lavender-pale); color: #6B44A0; padding: 1px 6px; border-radius: 8px; border: 1px solid var(--lavender); }

/* Workout card */
.workout-card { background: var(--white); border-radius: var(--radius-lg); padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
.workout-num { display: inline-block; font-size: 11px; font-weight: 700; background: linear-gradient(135deg, var(--pink) 0%, var(--pink-light) 100%); color: white; padding: 2px 10px; border-radius: 20px; margin-bottom: 8px; }
.workout-section { margin-bottom: 10px; }
.workout-section-title { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
.workout-content { font-size: 13px; color: var(--text); background: var(--bg); border-radius: 8px; padding: 8px 10px; min-height: 36px; white-space: pre-wrap; line-height: 1.6; }
.workout-content.empty-content { color: var(--text3); font-style: italic; }

/* Date picker */
.date-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }

/* Retroactive history */
.retro-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; background: var(--pink-pale); border-radius: 8px; margin-bottom: 4px; font-size: 13px; }

/* Divider */
.divider { border: none; border-top: 1px dashed var(--border2); margin: 12px 0; }

/* Season warning */
.season-warn { background: linear-gradient(135deg, #FFF0F3 0%, var(--peach-pale) 100%); border: 1px solid var(--pink-light); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 10px; font-size: 13px; color: #AA2244; font-weight: 500; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">🌸 健身課程管理 🌸</div>
    <div class="header-subtitle">讓每一堂課都留下美好紀錄</div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('checkin')">簽到</button>
      <button class="tab" onclick="switchTab('students')">學員</button>
      <button class="tab" onclick="switchTab('classes')">班別</button>
      <button class="tab" onclick="switchTab('workouts')">課表</button>
      <button class="tab" onclick="switchTab('history')">紀錄</button>
    </div>
  </div>

  <!-- 簽到 -->
  <div class="content" id="tab-checkin">
    <div id="season-warn"></div>
    <div id="alert-sessions"></div>
    <div id="alert-expire"></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">👩‍🦰 總學員</div><div class="stat-num" id="st-total">0</div></div>
      <div class="stat-card"><div class="stat-label">⚠️ 堂數不足</div><div class="stat-num warn" id="st-low">0</div></div>
      <div class="stat-card"><div class="stat-label">📅 即將到期</div><div class="stat-num danger" id="st-exp">0</div></div>
    </div>
    <div class="card">
      <div class="date-row">
        <div class="section-title" style="margin:0">課堂簽到</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text2)">日期</span>
          <input type="date" id="checkin-date" onchange="renderCheckinList()" style="font-size:13px;padding:6px 10px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text)">
        </div>
      </div>
      <div class="chips" id="checkin-filter"></div>
      <div id="checkin-list"></div>
    </div>
  </div>

  <!-- 學員 -->
  <div class="content" id="tab-students" style="display:none">
    <div class="chips" id="student-filter"></div>
    <div id="student-list"></div>
    <button class="fab" onclick="openAddModal()">＋</button>
  </div>

  <!-- 班別管理 -->
  <div class="content" id="tab-classes" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="section-title" style="margin:0">班別管理</div>
      <button class="btn btn-primary btn-sm" onclick="openClassModal()">＋ 新增班別</button>
    </div>
    <div id="class-list"></div>
  </div>

  <!-- 課表管理 -->
  <div class="content" id="tab-workouts" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="section-title" style="margin:0">課表管理</div>
      <button class="btn btn-primary btn-sm" onclick="openWorkoutModal()">＋ 新增課表</button>
    </div>
    <div id="workout-list"></div>
  </div>

  <!-- 紀錄 -->
  <div class="content" id="tab-history" style="display:none">
    <div class="card">
      <div class="section-title">上課紀錄</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- 新增學員 -->
<div class="overlay" id="modal-add">
  <div class="modal">
    <div class="modal-title">🌸 新增學員</div>
    <div class="form-row">
      <div class="form-group"><label>姓名</label><input id="f-name" type="text" placeholder="王小明"></div>
      <div class="form-group"><label>電話</label><input id="f-phone" type="tel" placeholder="0912-345-678"></div>
    </div>
    <div class="form-group"><label>班別（可多選）</label><div id="f-cls" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div></div>
    <div class="form-group">
      <label>加入日期</label>
      <input id="f-join" type="date" onchange="showDur('f-join','f-join-out')">
      <div id="f-join-out"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>購買堂數</label><input id="f-total" type="number" min="1" value="12" onchange="autoExp()"></div>
      <div class="form-group"><label>購課日期</label><input id="f-buy" type="date" onchange="autoExp()"></div>
    </div>
    <div class="form-group">
      <label>到期日</label>
      <input id="f-exp" type="date">
      <div class="expire-hint" id="f-exp-hint"></div>
    </div>
    <div class="form-group"><label>特殊狀況備註</label><textarea id="f-note" placeholder="例如：左膝舊傷..."></textarea></div>
    <hr class="divider">
    <div class="form-group">
      <label>📋 回溯已上課記錄（選填）</label>
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px">輸入學員過去已上課的日期，系統將自動扣除已使用堂數</div>
      <div id="retro-list" style="margin-bottom:8px"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input type="date" id="retro-date" style="flex:1;font-size:13px;padding:7px 10px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text)">
        <select id="retro-cls" style="flex:1;font-size:13px;padding:7px 10px;border-radius:10px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text)"></select>
        <button class="btn btn-mint btn-sm" onclick="addRetroDate()">加入</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-add')">取消</button>
      <button class="btn btn-primary" onclick="addStudent()">確認新增</button>
    </div>
  </div>
</div>

<!-- 補購 -->
<div class="overlay" id="modal-purchase">
  <div class="modal">
    <div class="modal-title" id="pur-title">💝 補購堂數</div>
    <div class="form-row">
      <div class="form-group"><label>追加堂數</label><input id="p-add" type="number" min="1" value="12" onchange="autoPurExp()"></div>
      <div class="form-group"><label>補購日期</label><input id="p-buy" type="date" onchange="autoPurExp()"></div>
    </div>
    <div class="form-group">
      <label>到期日</label>
      <input id="p-exp" type="date">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const KEY = 'fitness_v7';
const COLOR_OPTIONS = [
  {color:'#FF8FAB',bg:'#FFF0F3',name:'玫瑰粉'},
  {color:'#FF7BAC',bg:'#FFE8F0',name:'桃花粉'},
  {color:'#C8A2C8',bg:'#F3EEFF',name:'薰衣草'},
  {color:'#98D8C8',bg:'#E8FAF5',name:'薄荷綠'},
  {color:'#FFB347',bg:'#FFF4E6',name:'蜜桃橘'},
  {color:'#87CEEB',bg:'#EBF7FF',name:'天空藍'},
  {color:'#DDA0DD',bg:'#F8EEFF',name:'紫羅蘭'},
  {color:'#F4A460',bg:'#FDF3E8',name:'焦糖棕'},
];
const WEEKDAYS = ['日','一','二','三','四','五','六'];
const ERULES=[{s:4,d:42},{s:12,d:120},{s:20,d:180}];

function expDays(n){n=parseInt(n)||0;for(let i=ERULES.length-1;i>=0;i--)if(n>=ERULES[i].s)return ERULES[i].d;return 42;}
function expLbl(n){n=parseInt(n)||0;return n<=4?'6週':n<=12?'4個月':'6個月';}
function addD(s,d){const x=new Date(s);x.setDate(x.getDate()+d);return x.toISOString().slice(0,10);}
function diffD(s){const a=new Date(s),b=new Date();b.setHours(0,0,0,0);a.setHours(0,0,0,0);return Math.round((a-b)/86400000);}
function durStr(s){
  if(!s)return'';const st=new Date(s),now=new Date();now.setHours(0,0,0,0);st.setHours(0,0,0,0);
  if(now<st)return'';
  let y=now.getFullYear()-st.getFullYear(),m=now.getMonth()-st.getMonth(),d=now.getDate()-st.getDate();
  if(d<0){m--;const p=new Date(now.getFullYear(),now.getMonth(),0);d+=p.getDate();}
  if(m<0){y--;m+=12;}
  const p=[];if(y>0)p.push(y+'年');if(m>0)p.push(m+'個月');if(d>0)p.push(d+'天');
  return p.length?'已加入 '+p.join(' '):'今天加入';
}
function fmtDate(s){if(!s)return'';const d=new Date(s);return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}

// Generate season dates (3 months from start)
function genSeasonDates(startDate, weekdays) {
  const dates = [];
  const start = new Date(startDate);
  const end = new Date(startDate);
  end.setMonth(end.getMonth() + 3);
  let cur = new Date(start);
  while (cur <= end) {
    if (weekdays.includes(cur.getDay())) {
      dates.push(cur.toISOString().slice(0,10));
    }
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

// Workout number generator A001-A999, B001...
function genWorkoutNum(workouts) {
  if (!workouts.length) return 'A001';
  const last = workouts[workouts.length-1].num;
  const letter = last[0];
  const num = parseInt(last.slice(1));
  if (num >= 999) {
    const nextLetter = String.fromCharCode(letter.charCodeAt(0)+1);
    return nextLetter + '001';
  }
  return letter + String(num+1).padStart(3,'0');
}

let state = { students:[], history:[], classes:[], workouts:[] };
let purId=null, editId=null, addCls=[], editCls=[];
let selCI='', selSF='all';
let editClassId=null, editWorkoutId=null, viewWorkoutId=null;
let assignDate=null, assignClassId=null;
let retroDates=[];

function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function load(){
  try{const r=localStorage.getItem(KEY);if(r)state=JSON.parse(r);}catch(e){}
  if(!state.students)state.students=[];
  if(!state.history)state.history=[];
  if(!state.classes)state.classes=[];
  if(!state.workouts)state.workouts=[];
  // default class selection
  if(state.classes.length) selCI=state.classes[0].id;
  document.getElementById('checkin-date').value=new Date().toISOString().slice(0,10);
  renderAll();
}

function ini(n){if(!n)return'?';const t=n.trim();if(/[\u4e00-\u9fff]/.test(t))return t.slice(-2);return t.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function getCls(id){return state.classes.find(c=>c.id===id);}
function isLow(s){return s.remainingSessions>0&&s.remainingSessions<=2;}
function isEmpty(s){return s.remainingSessions<=0;}
function isExpSoon(s){return s.expireDate&&diffD(s.expireDate)<=14;}
function isExpired(s){return s.expireDate&&diffD(s.expireDate)<0;}
function badgeInfo(s){
  if(isEmpty(s))return['badge-danger','已用完'];
  if(s.remainingSessions===1)return['badge-danger','最後1堂'];
  if(isLow(s))return['badge-warn','剩'+s.remainingSessions+'堂'];
  return['badge-ok','剩'+s.remainingSessions+'堂'];
}
function selDate(){return document.getElementById('checkin-date').value||new Date().toISOString().slice(0,10);}
function nowT(){return new Date().toTimeString().slice(0,5);}

function toast(msg,t){
  const el=document.getElementById('toast');el.textContent=msg;
  el.className=(t==='w'?'tw':t==='d'?'td':'tn')+' show';
  setTimeout(()=>el.classList.remove('show'),3000);
}
function openModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden';}
function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow='';}

function showDur(inId,outId){
  const v=document.getElementById(inId).value;const el=document.getElementById(outId);
  const t=durStr(v);el.innerHTML=t?`<span class="join-dur">${t}</span>`:'';
}
function autoExp(){
  const s=document.getElementById('f-total').value,b=document.getElementById('f-buy').value;
  const h=document.getElementById('f-exp-hint'),i=document.getElementById('f-exp');
  if(b){const sg=addD(b,expDays(s));i.value=sg;h.textContent='💡 建議'+expLbl(s)+'內（'+sg+'）';}
}
function autoPurExp(){
  const s=document.getElementById('p-add').value,b=document.getElementById('p-buy').value;
  const h=document.getElementById('p-exp-hint'),i=document.getElementById('p-exp');
  if(b){const sg=addD(b,expDays(s));i.value=sg;h.textContent='💡 建議'+expLbl(s)+'內（'+sg+'）';}
}

// Season warning check
function checkSeasonWarn(){
  const el=document.getElementById('season-warn');
  let warns=[];
  state.classes.forEach(cls=>{
    if(!cls.dates||!cls.dates.length)return;
    const futureDates=cls.dates.filter(d=>!cls.cancelled||!cls.cancelled.includes(d)).filter(d=>diffD(d)>=0);
    if(futureDates.length<=3){
      warns.push(`「${cls.name}」排程剩餘不足，請盡快更新！`);
    }
  });
  el.innerHTML=warns.map(w=>`<div class="season-warn">📅 ${w}</div>`).join('');
}

function renderAlerts(){
  const low=state.students.filter(s=>isLow(s)||isEmpty(s));
  const exp=state.students.filter(s=>isExpSoon(s)||isExpired(s));
  const clsStr=s=>(s.classIds||[]).map(id=>{const c=getCls(id);return c?c.name:'';}).filter(Boolean).join('、')||'未分班';
  document.getElementById('alert-sessions').innerHTML=low.length?
    `<div class="alert alert-warn"><div class="alert-title">⚠️ 堂數不足（${low.length}位）</div>${low.map(s=>`<div class="alert-item"><span class="alert-dot"></span><b>${s.name}</b>（${clsStr(s)}）— ${isEmpty(s)?'已用完':s.remainingSessions===1?'本次上完需補購':'剩'+s.remainingSessions+'堂'}</div>`).join('')}</div>`:'';
  document.getElementById('alert-expire').innerHTML=exp.length?
    `<div class="alert alert-danger"><div class="alert-title">📅 課程到期提醒（${exp.length}位）</div>${exp.map(s=>{const d=diffD(s.expireDate);return`<div class="alert-item"><span class="alert-dot"></span><b>${s.name}</b>（${clsStr(s)}）— ${d<0?'已過期'+Math.abs(d)+'天':d===0?'今天到期':d+'天後到期'}（${s.expireDate}）</div>`;}).join('')}</div>`:'';
}

function renderCheckinFilter(){
  const el=document.getElementById('checkin-filter');
  if(!state.classes.length){el.innerHTML=`<div style="font-size:13px;color:var(--text2)">尚未建立班別，請先至「班別」頁面新增</div>`;return;}
  el.innerHTML=state.classes.map(c=>{
    const a=selCI===c.id;
    return`<button class="chip" onclick="setCI('${c.id}')" style="background:${a?c.color:'var(--white)'};color:${a?'#fff':c.color};border-color:${c.color};font-weight:600">${c.name}</button>`;
  }).join('');
}
function renderStudentFilter(){
  const allA=selSF==='all';
  document.getElementById('student-filter').innerHTML=
    `<button class="chip" onclick="setSF('all')" style="background:${allA?'var(--pink)':'var(--white)'};color:${allA?'#fff':'var(--text2)'};border-color:${allA?'var(--pink)':'var(--border2)'}">全部</button>`+
    state.classes.map(c=>{const a=selSF===c.id;return`<button class="chip" onclick="setSF('${c.id}')" style="background:${a?c.color:'var(--white)'};color:${a?'#fff':c.color};border-color:${c.color}">${c.name}</button>`;}).join('');
}
function setCI(id){selCI=id;renderCheckinFilter();renderCheckinList();}
function setSF(id){selSF=id;renderStudentFilter();renderStudentList();}

function getRec(sid,cid,date){return[...state.history].reverse().find(h=>h.studentId===sid&&h.classId===cid&&h.date===date);}

function renderCheckinList(){
  const el=document.getElementById('checkin-list');
  if(!selCI){el.innerHTML=`<div class="empty"><div class="empty-icon">🎀</div>請先選擇班別</div>`;return;}
  const cls=getCls(selCI);if(!cls){el.innerHTML='';return;}
  const date=selDate();
  const members=state.students.filter(s=>s.classIds&&s.classIds.includes(selCI));
  if(!members.length){el.innerHTML=`<div class="empty"><div class="empty-icon">🌸</div>此班級尚無學員</div>`;return;}
  // Show course plan for this date
  const assignment = cls.assignments&&cls.assignments[date];
  const wo = assignment?state.workouts.find(w=>w.id===assignment):null;
  let headerHtml = '';
  if(wo){headerHtml=`<div style="background:var(--lavender-pale);border-radius:10px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:13px"><span style="font-weight:700;color:#6B44A0">${wo.num}</span><span style="color:var(--text2)">今日課表</span><button class="btn btn-sm" style="margin-left:auto;font-size:11px;padding:3px 8px" onclick="viewWorkout('${wo.id}')">查看</button></div>`;}
  el.innerHTML=headerHtml+members.map(s=>{
    const rec=getRec(s.id,selCI,date);
    const [bc,bt]=badgeInfo(s);
    const low=(isLow(s)||isEmpty(s))&&!rec;
    const eW=isExpSoon(s)||isExpired(s);
    const noteH=s.note?`<div class="note-tag">📋 ${s.note}</div>`:'';
    let expT='';if(eW&&s.expireDate){const d=diffD(s.expireDate);expT=` <span class="expire-inline">${d<0?'已過期':d===0?'今日到期':d+'天後到期'}</span>`;}
    let sc=low?'low-bg':'';
    let acts='';
    if(!rec){
      acts=(isEmpty(s)?`<button class="btn btn-sm" disabled style="opacity:0.4;font-size:11px">堂數用完</button>`:`<button class="btn btn-primary btn-sm" onclick="doCI('${s.id}','${selCI}')">簽到</button>`)+
        `<button class="btn btn-blue btn-sm" onclick="markAbs('${s.id}','${selCI}','excused')">請假</button>`+
        `<button class="btn btn-red btn-sm" onclick="markAbs('${s.id}','${selCI}','unexcused')">未到</button>`;
    }else if(rec.type==='checkin'){sc='';acts=`<span class="time-tag">✅ ${rec.time}</span><button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="cancelRec('${s.id}','${selCI}','${date}')">取消</button>`;}
    else if(rec.type==='excused'){sc='excused-bg';acts=`<span class="absent-tag absent-excused">請假（不扣）</span><button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="cancelRec('${s.id}','${selCI}','${date}')">取消</button>`;}
    else if(rec.type==='unexcused'){sc='unexcused-bg';acts=`<span class="absent-tag absent-unexcused">未到（扣堂）</span><button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="cancelRec('${s.id}','${selCI}','${date}')">取消</button>`;}
    return`<div class="check-item ${sc}">
      <div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0">
        <div class="avatar" style="background:${cls.bg};color:${cls.color}">${ini(s.name)}</div>
        <div style="min-width:0">
          <div style="font-size:14px;font-weight:600;color:var(--text)">${s.name} <span class="badge ${bc}">${bt}</span>${s.remainingSessions===1&&!rec?' <span class="warn-inline">本次上完需補購</span>':''}${expT}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${s.phone||''}</div>
          ${noteH}
        </div>
      </div>
      <div class="check-actions">${acts}</div>
    </div>`;
  }).join('');
}

function renderStudentRow(s){
  const [bc,bt]=badgeInfo(s);
  const tags=(s.classIds||[]).map(id=>{const c=getCls(id);return c?`<span style="font-size:10px;padding:1px 7px;border-radius:10px;background:${c.bg};color:${c.color};font-weight:600">${c.name}</span>`:''}).join('');
  const noteH=s.note?`<div class="note-tag" style="margin-top:3px">📋 ${s.note}</div>`:'';
  const joinH=s.joinDate?`<div class="join-dur" style="margin-top:3px">${durStr(s.joinDate)}</div>`:'';
  let expH='';
  if(s.expireDate){const d=diffD(s.expireDate);const col=d<0?'#CC3355':d<=14?'#B87800':'var(--text2)';expH=`<div style="font-size:11px;color:${col};margin-top:2px">📅 ${d<0?'已過期'+Math.abs(d)+'天':d===0?'今天到期':d+'天後到期（'+s.expireDate+'）'}</div>`;}
  return`<div class="student-row">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:14px;font-weight:700;color:var(--text)">${s.name}<span class="badge ${bc}">${bt}</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:3px">${tags}</div>
      ${noteH}${joinH}
      <div style="font-size:11px;color:var(--text2);margin-top:3px">剩餘 ${s.remainingSessions} / ${s.totalSessions} 堂</div>
      ${expH}${s.phone?`<div style="font-size:11px;color:var(--text2)">${s.phone}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0;margin-left:8px">
      <button class="btn btn-sm btn-blue" onclick="openRecord('${s.id}')">課堂紀錄</button>
      <button class="btn btn-sm" onclick="openEdit('${s.id}')">編輯</button>
      <button class="btn btn-sm ${isLow(s)||isEmpty(s)?'btn-warn':''}" onclick="openPur('${s.id}')">補購</button>
    </div>
  </div>`;
}

function renderStudentList(){
  const el=document.getElementById('student-list');
  let f=state.students;
  if(selSF!=='all')f=f.filter(s=>s.classIds&&s.classIds.includes(selSF));
  if(!f.length){el.innerHTML=`<div class="card"><div class="empty"><div class="empty-icon">🌸</div>${selSF==='all'?'尚無學員，請按右下角＋新增':'此班級尚無學員'}</div></div>`;return;}
  if(selSF==='all'){
    let html='';
    state.classes.forEach(cls=>{const m=f.filter(s=>s.classIds&&s.classIds.includes(cls.id));if(!m.length)return;
      html+=`<div class="cls-hd"><span style="width:10px;height:10px;border-radius:50%;background:${cls.color};display:inline-block"></span>${cls.name}<span style="font-size:11px;color:var(--text2);font-weight:400">${m.length}人</span></div><div class="card" style="padding:0.25rem 1rem;margin-bottom:14px">`+m.map(s=>renderStudentRow(s)).join('')+`</div>`;
    });
    const nc=f.filter(s=>!s.classIds||s.classIds.length===0);
    if(nc.length)html+=`<div class="cls-hd"><span style="width:10px;height:10px;border-radius:50%;background:var(--text2);display:inline-block"></span>未分班<span style="font-size:11px;color:var(--text2);font-weight:400">${nc.length}人</span></div><div class="card" style="padding:0.25rem 1rem;margin-bottom:14px">`+nc.map(s=>renderStudentRow(s)).join('')+`</div>`;
    el.innerHTML=html||`<div class="card"><div class="empty"><div class="empty-icon">🌸</div>尚無學員</div></div>`;
  }else{el.innerHTML=`<div class="card" style="padding:0.25rem 1rem">`+f.map(s=>renderStudentRow(s)).join('')+`</div>`;}
}

function switchTab(t){

// Retroactive dates
function renderRetroDates(){
  const el=document.getElementById('retro-list');
  if(!retroDates.length){el.innerHTML='';return;}
  el.innerHTML=retroDates.map((r,i)=>{
    const cls=getCls(r.classId);
    return`<div class="retro-item"><span>${fmtDate(r.date)} ${cls?`<span style="font-size:10px;background:${cls.bg};color:${cls.color};padding:1px 6px;border-radius:8px">${cls.name}</span>`:''}</span><button class="btn btn-red btn-sm" onclick="removeRetro(${i})">✕</button></div>`;
  }).join('');
}
function addRetroDate(){
  const date=document.getElementById('retro-date').value;
  const classId=document.getElementById('retro-cls').value;
  if(!date||!classId){toast('請選擇日期和班別','w');return;}
  if(retroDates.find(r=>r.date===date&&r.classId===classId)){toast('此日期已加入','w');return;}
  retroDates.push({date,classId});retroDates.sort((a,b)=>a.date.localeCompare(b.date));
  renderRetroDates();
}
function removeRetro(i){retroDates.splice(i,1);renderRetroDates();}

function openAddModal(){
  addCls=[];retroDates=[];
  ['f-name','f-phone','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-total').value='12';document.getElementById('f-exp').value='';document.getElementById('f-exp-hint').textContent='';document.getElementById('f-join-out').innerHTML='';
  const d=new Date().toISOString().slice(0,10);
  document.getElementById('f-buy').value=d;document.getElementById('f-join').value=d;
  renderClsChips('f-cls',addCls,'togA');autoExp();showDur('f-join','f-join-out');
  // populate retro class selector
  const sel=document.getElementById('retro-cls');
  sel.innerHTML=state.classes.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  renderRetroDates();
  openModal('modal-add');
}

function addStudent(){
  const name=document.getElementById('f-name').value.trim();if(!name){toast('請輸入姓名','w');return;}
  const total=parseInt(document.getElementById('f-total').value)||12;
  const usedByRetro=retroDates.length;
  const remaining=Math.max(0,total-usedByRetro);
  const id=Date.now().toString();
  state.students.push({id,name,phone:document.getElementById('f-phone').value.trim(),classIds:[...addCls],joinDate:document.getElementById('f-join').value,totalSessions:total,remainingSessions:remaining,buyDate:document.getElementById('f-buy').value,expireDate:document.getElementById('f-exp').value,note:document.getElementById('f-note').value.trim()});
  // add retroactive history
  retroDates.forEach(r=>{
    state.history.push({studentId:id,classId:r.classId,date:r.date,time:'00:00',type:'retroactive',remainingAfter:0});
  });
  // recalculate remaining after for retro entries
  let rem=total;
  const studentHistory=state.history.filter(h=>h.studentId===id).sort((a,b)=>a.date.localeCompare(b.date));
  studentHistory.forEach(h=>{rem=Math.max(0,rem-1);h.remainingAfter=rem;});
  save();renderAll();closeModal('modal-add');toast('學員已新增 🌸');
}

function renderClsChips(cid,selIds,fn){
  const el=document.getElementById(cid);
  el.innerHTML=state.classes.map(c=>{const a=selIds.includes(c.id);return`<label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid ${a?c.color:'var(--border2)'};background:${a?c.bg:'var(--white)'};cursor:pointer;font-size:13px;color:${a?c.color:'var(--text2)'};font-weight:600"><input type="checkbox" style="display:none" ${a?'checked':''} onchange="${fn}('${c.id}',this.checked)">${c.name}</label>`;}).join('');
}
function togA(id,v){if(v)addCls.push(id);else addCls=addCls.filter(x=>x!==id);renderClsChips('f-cls',addCls,'togA');}
function togE(id,v){if(v)editCls.push(id);else editCls=editCls.filter(x=>x!==id);renderClsChips('e-cls',editCls,'togE');}

function openEdit(id){

// Class management
let clsWeekdays=[], clsColorIdx=0;
function openClassModal(id){
  editClassId=id||null;
  clsWeekdays=[];clsColorIdx=0;
  if(id){
    const cls=getCls(id);if(!cls)return;
    document.getElementById('cls-name').value=cls.name;
    clsWeekdays=[...(cls.weekdays||[])];
    clsColorIdx=COLOR_OPTIONS.findIndex(c=>c.color===cls.color)||0;
    document.getElementById('cls-start').value=cls.startDate||new Date().toISOString().slice(0,10);
    document.getElementById('cls-modal-title').textContent='✏️ 編輯班別';
  }else{
    document.getElementById('cls-name').value='';
    document.getElementById('cls-start').value=new Date().toISOString().slice(0,10);
    document.getElementById('cls-modal-title').textContent='🎀 新增班別';
  }
  renderColorPicker();renderWeekdayGrid();
  openModal('modal-class');
}
function renderColorPicker(){
  document.getElementById('cls-color-picker').innerHTML=COLOR_OPTIONS.map((c,i)=>`<div onclick="selectColor(${i})" style="width:32px;height:32px;border-radius:50%;background:${c.color};cursor:pointer;border:3px solid ${clsColorIdx===i?'var(--text)':'transparent'};box-shadow:${clsColorIdx===i?'0 0 0 2px white inset':'none'}" title="${c.name}"></div>`).join('');
}
function selectColor(i){clsColorIdx=i;renderColorPicker();}
function renderWeekdayGrid(){
  document.getElementById('cls-weekdays').innerHTML=WEEKDAYS.map((d,i)=>`<button class="weekday-btn ${clsWeekdays.includes(i)?'active':''}" onclick="toggleWeekday(${i})">${d}</button>`).join('');
}
function toggleWeekday(i){if(clsWeekdays.includes(i))clsWeekdays=clsWeekdays.filter(x=>x!==i);else clsWeekdays.push(i);renderWeekdayGrid();}
function saveClass(){
  const name=document.getElementById('cls-name').value.trim();if(!name){toast('請輸入班別名稱','w');return;}
  const startDate=document.getElementById('cls-start').value;
  const col=COLOR_OPTIONS[clsColorIdx];
  const dates=clsWeekdays.length&&startDate?genSeasonDates(startDate,clsWeekdays):[];
  if(editClassId){
    const cls=getCls(editClassId);if(!cls)return;
    cls.name=name;cls.color=col.color;cls.bg=col.bg;cls.weekdays=clsWeekdays;cls.startDate=startDate;cls.dates=dates;
    if(!cls.cancelled)cls.cancelled=[];if(!cls.assignments)cls.assignments={};
  }else{
    const id='cls_'+Date.now();
    state.classes.push({id,name,color:col.color,bg:col.bg,weekdays:clsWeekdays,startDate,dates,cancelled:[],assignments:{}});
    if(!selCI)selCI=id;
  }
  save();renderAll();closeModal('modal-class');toast('班別已儲存 🎀');
}
function deleteClass(id){
  if(!confirm('確定刪除此班別？'))return;
  state.classes=state.classes.filter(c=>c.id!==id);
  if(selCI===id)selCI=state.classes.length?state.classes[0].id:'';
  save();renderAll();toast('班別已刪除');
}

function viewSchedule(clsId){
  const cls=getCls(clsId);if(!cls)return;
  assignClassId=clsId;
  document.getElementById('sch-title').textContent='📅 '+cls.name+' 排程';
  const all=cls.dates||[];
  const future=all.filter(d=>diffD(d)>=-30);
  // Season end warning
  const remaining=future.filter(d=>diffD(d)>=0&&(!cls.cancelled||!cls.cancelled.includes(d)));
  const warnEl=document.getElementById('season-end-warn');
  warnEl.innerHTML=remaining.length<=3?`<div class="alert alert-danger" style="margin-bottom:10px"><div class="alert-title">⚠️ 排程即將結束，請盡快更新！</div></div>`:'';
  document.getElementById('sch-range').textContent=future.length?`${fmtDate(future[0])} ～ ${fmtDate(future[future.length-1])}`:'尚未設定排程';
  const wo_options=state.workouts.map(w=>`<option value="${w.id}">${w.num}</option>`).join('');
  document.getElementById('sch-list').innerHTML=future.map(d=>{
    const cancelled=cls.cancelled&&cls.cancelled.includes(d);
    const assignment=cls.assignments&&cls.assignments[d];
    const wo=assignment?state.workouts.find(w=>w.id===assignment):null;
    return`<div class="schedule-date-item ${cancelled?'cancelled':'normal'}">
      <span>${fmtDate(d)}（${WEEKDAYS[new Date(d).getDay()]}）</span>
      <div style="display:flex;gap:6px;align-items:center">
        ${wo?`<span class="course-tag" onclick="viewWorkout('${wo.id}')" style="cursor:pointer">${wo.num}</span>`:''} 
        ${!cancelled?`<button class="btn btn-sm" style="font-size:10px;padding:3px 7px" onclick="assignWorkoutToDate('${d}')">指定課表</button><button class="btn btn-red btn-sm" style="font-size:10px;padding:3px 7px" onclick="cancelDate('${clsId}','${d}')">停課</button>`:`<button class="btn btn-sm" style="font-size:10px;padding:3px 7px" onclick="restoreDate('${clsId}','${d}')">恢復</button>`}
      </div>
    </div>`;
  }).join('');
  openModal('modal-schedule');
}
function cancelDate(clsId,date){
  const cls=getCls(clsId);if(!cls)return;
  if(!cls.cancelled)cls.cancelled=[];
  if(!cls.cancelled.includes(date))cls.cancelled.push(date);
  save();viewSchedule(clsId);toast('已標記停課');
}
function restoreDate(clsId,date){
  const cls=getCls(clsId);if(!cls)return;
  cls.cancelled=(cls.cancelled||[]).filter(d=>d!==date);
  save();viewSchedule(clsId);toast('已恢復上課');
}

function assignWorkoutToDate(date){
  assignDate=date;
  document.getElementById('assign-date-label').textContent=`${fmtDate(date)} 指定課表`;
  const sel=document.getElementById('assign-workout-sel');
  sel.innerHTML=`<option value="">（不指定）</option>`+state.workouts.map(w=>`<option value="${w.id}">${w.num}</option>`).join('');
  const cls=getCls(assignClassId);
  if(cls&&cls.assignments&&cls.assignments[date])sel.value=cls.assignments[date];
  openModal('modal-assign-workout');
}
function confirmAssignWorkout(){
  const cls=getCls(assignClassId);if(!cls)return;
  if(!cls.assignments)cls.assignments={};
  const val=document.getElementById('assign-workout-sel').value;
  if(val)cls.assignments[assignDate]=val;else delete cls.assignments[assignDate];
  save();closeModal('modal-assign-workout');viewSchedule(assignClassId);toast('課表已指定 📋');
}

// Checkin actions
function showConfirm(s,classId){
  const cls=getCls(classId);
  document.getElementById('cf-name').textContent=s.name+' 簽到成功！';
  document.getElementById('cf-class').textContent=cls?cls.name:'';
  document.getElementById('cf-date').textContent=selDate()+' '+nowT();
  document.getElementById('cf-remain').textContent='剩餘 '+s.remainingSessions+' 堂';
  document.getElementById('cf-expire-txt').textContent=s.expireDate?'課程到期日：'+s.expireDate:'';
  const w=document.getElementById('cf-warn');
  if(isEmpty(s)){w.textContent='⚠️ 堂數已全數用完，請盡快補購！';w.style.display='block';}
  else if(s.remainingSessions===1){w.textContent='⚠️ 下次上課前請記得補購堂數！';w.style.display='block';}
  else if(isLow(s)){w.textContent='⚠️ 堂數僅剩'+s.remainingSessions+'堂，建議盡快補購。';w.style.display='block';}
  else{w.style.display='none';}
  document.getElementById('shot-hint').style.display='none';
  document.getElementById('btn-shot').textContent='📸 截取畫面';
  document.getElementById('btn-shot').disabled=false;
  openModal('modal-confirm');
}
function doShot(){
  const el=document.getElementById('confirm-snap');
  const btn=document.getElementById('btn-shot');
  const hint=document.getElementById('shot-hint');
  btn.textContent='截取中...';btn.disabled=true;
  html2canvas(el,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false}).then(canvas=>{
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;
      a.download='簽到確認_'+new Date().toISOString().slice(0,16).replace('T','_')+'.png';
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      btn.textContent='📸 截取畫面';btn.disabled=false;
      hint.textContent='圖片已儲存 🌸';hint.style.display='block';
    });
  }).catch(()=>{btn.textContent='📸 截取畫面';btn.disabled=false;hint.textContent='請手動截圖（側鍵+音量鍵）';hint.style.display='block';});
}

function openRecord(id){
  const s=state.students.find(x=>x.id===id);if(!s)return;
  document.getElementById('sr-name').textContent=s.name;
  const tags=(s.classIds||[]).map(id2=>{const c=getCls(id2);return c?c.name:'';}).filter(Boolean).join('、')||'未分班';
  let meta=tags;if(s.joinDate){const dur=durStr(s.joinDate);if(dur)meta+=' ・ '+dur;}
  document.getElementById('sr-meta').textContent=meta;
  document.getElementById('sr-total').textContent=s.totalSessions;
  document.getElementById('sr-used').textContent=s.totalSessions-s.remainingSessions;
  const rem=document.getElementById('sr-remain');rem.textContent=s.remainingSessions;rem.style.color=isEmpty(s)?'#CC3355':isLow(s)?'#B87800':'var(--pink)';
  const expEl=document.getElementById('sr-exp-info');
  if(s.expireDate){const d=diffD(s.expireDate);const col=d<0?'#CC3355':d<=14?'#B87800':'var(--text2)';expEl.innerHTML=`<span style="color:${col}">📅 課程到期日：${s.expireDate}（${d<0?'已過期'+Math.abs(d)+'天':d===0?'今天到期':d+'天後到期'}）</span>`;}else{expEl.textContent='';}
  const recs=state.history.filter(h=>h.studentId===id).reverse();
  const tl={checkin:'✅ 簽到',excused:'🔵 請假（不扣堂）',unexcused:'🔴 未到（已扣堂）',retroactive:'📋 回溯登記'};
  const recEl=document.getElementById('sr-records');
  if(!recs.length){recEl.innerHTML='<div style="font-size:13px;color:var(--text2);padding:8px 0">尚無上課紀錄</div>';}
  else{
    recEl.innerHTML=recs.map(h=>{const cls=getCls(h.classId);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px dashed var(--border);font-size:13px">
      <div><span style="color:var(--text)">${h.date}</span>${cls?`<span style="font-size:10px;padding:1px 5px;border-radius:8px;background:${cls.bg};color:${cls.color};margin-left:5px;font-weight:600">${cls.name}</span>`:''}<span style="color:var(--text2);font-size:11px;margin-left:4px">${tl[h.type]||'✅ 簽到'}</span></div>
      <div style="color:var(--text2);font-size:12px">剩 ${h.remainingAfter} 堂</div>
    </div>`;}).join('')+
    `<div style="font-size:11px;color:var(--text2);padding-top:6px">共 ${recs.filter(h=>h.type==='checkin'||h.type==='retroactive').length} 次到課・${recs.filter(h=>h.type==='excused').length} 次請假・${recs.filter(h=>h.type==='unexcused').length} 次未到</div>`;
  }
  openModal('modal-record');
}
function doRecordShot(){
  const el=document.getElementById('record-snap');
  html2canvas(el,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false}).then(canvas=>{
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='課堂紀錄_'+new Date().toISOString().slice(0,10)+'.png';
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('課堂紀錄已儲存 🌸');
    });
  }).catch(()=>toast('截圖失敗，請手動截圖','w'));
}

function doCI(studentId,classId){
  const s=state.students.find(x=>x.id===studentId);
  if(!s||isEmpty(s)){toast('堂數已用完','d');return;}
  s.remainingSessions-=1;
  state.history.push({studentId,classId,date:selDate(),time:nowT(),type:'checkin',remainingAfter:s.remainingSessions});
  save();renderAll();showConfirm(s,classId);
}
function markAbs(studentId,classId,type){
  const s=state.students.find(x=>x.id===studentId);if(!s)return;
  if(type==='unexcused'&&!isEmpty(s))s.remainingSessions-=1;
  state.history.push({studentId,classId,date:selDate(),time:nowT(),type,remainingAfter:s.remainingSessions});
  save();renderAll();
  toast(type==='excused'?s.name+' 請假，不扣堂 🔵':s.name+' 未到，已扣1堂 🔴',type==='unexcused'?'w':'');
}
function cancelRec(studentId,classId,date){
  const s=state.students.find(x=>x.id===studentId);if(!s)return;
  const result=[...state.history].map((h,i)=>({h,i})).reverse().find(({h})=>h.studentId===studentId&&h.classId===classId&&h.date===date);
  if(!result)return;
  const rec=state.history[result.i];
  if(rec.type==='checkin'||rec.type==='unexcused')s.remainingSessions+=1;
  state.history.splice(result.i,1);
  save();renderAll();toast('已取消記錄');
}

load();
</script>
