<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="課程管理">
<title>健身課程管理</title>
<style>
:root {
  --bg: #ffffff;
  --bg2: #f5f5f5;
  --bg3: #eeeeee;
  --text: #111111;
  --text2: #666666;
  --text3: #999999;
  --border: rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.2);
  --radius: 8px;
  --radius-lg: 12px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1e;
    --bg2: #2c2c2e;
    --bg3: #3a3a3c;
    --text: #f2f2f7;
    --text2: #aeaeb2;
    --text3: #636366;
    --border: rgba(255,255,255,0.1);
    --border2: rgba(255,255,255,0.2);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; }
.app { max-width: 600px; margin: 0 auto; min-height: 100vh; }

/* Header */
.header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: env(safe-area-inset-top, 44px) 16px 0; position: sticky; top: 0; z-index: 50; }
.header-title { font-size: 17px; font-weight: 600; color: var(--text); text-align: center; padding: 12px 0 0; }
.tab-bar { display: flex; gap: 0; margin-top: 8px; }
.tab { flex: 1; padding: 10px 4px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; text-align: center; }
.tab.active { color: #007AFF; border-bottom-color: #007AFF; font-weight: 500; }

/* Content */
.content { padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px)); }

/* Cards */
.card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.stat-card { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
.stat-num { font-size: 22px; font-weight: 600; color: var(--text); }
.stat-num.warn { color: #FF9500; }
.stat-num.danger { color: #FF3B30; }

/* Alerts */
.alert { border-radius: var(--radius); padding: 10px 14px; margin-bottom: 10px; }
.alert-warn { background: #FFF3CD; border: 0.5px solid #FFCC00; }
.alert-danger { background: #FFE5E5; border: 0.5px solid #FF6B6B; }
.alert-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.alert-warn .alert-title { color: #7A4F00; }
.alert-danger .alert-title { color: #8B0000; }
.alert-item { font-size: 12px; padding: 1px 0; display: flex; gap: 6px; }
.alert-warn .alert-item { color: #7A4F00; }
.alert-danger .alert-item { color: #8B0000; }
.alert-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.alert-warn .alert-dot { background: #FFCC00; }
.alert-danger .alert-dot { background: #FF6B6B; }

/* Section title */
.section-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; }

/* Date picker row */
.date-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
.date-row label { font-size: 13px; color: var(--text2); }
.date-row input[type="date"] { font-size: 14px; color: var(--text); background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 10px; }

/* Class chips */
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.chip { padding: 6px 14px; font-size: 13px; border-radius: 20px; border: 0.5px solid var(--border2); cursor: pointer; background: var(--bg); color: var(--text2); white-space: nowrap; }

/* Avatar */
.avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }

/* Badges */
.badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 6px; font-weight: 500; }
.badge-ok { background: #d4edda; color: #155724; }
.badge-warn { background: #fff3cd; color: #7A4F00; }
.badge-danger { background: #f8d7da; color: #721c24; }

/* Buttons */
button { font-family: inherit; cursor: pointer; border: none; }
.btn { padding: 8px 14px; font-size: 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); }
.btn:active { opacity: 0.7; }
.btn-primary { background: #007AFF; color: #fff; border-color: #007AFF; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 7px; }
.btn-warn { background: #fff3cd; color: #7A4F00; border-color: #FFCC00; }
.btn-blue { background: #E8F4FD; color: #0066CC; border-color: #90CAF9; }
.btn-red { background: #FFE5E5; color: #CC0000; border-color: #FF9999; }
.btn-green { background: #d4edda; color: #155724; border-color: #80C784; }

/* Check items */
.check-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 11px 0; border-bottom: 0.5px solid var(--border); gap: 8px; }
.check-item:last-child { border-bottom: none; }
.check-item.low-bg { background: #FFF8E8; border-radius: var(--radius); padding: 11px 8px; margin: 0 -8px; }
.check-item.excused-bg { background: #EAF4FF; border-radius: var(--radius); padding: 11px 8px; margin: 0 -8px; }
.check-item.unexcused-bg { background: #FFF0F0; border-radius: var(--radius); padding: 11px 8px; margin: 0 -8px; }
.check-actions { display: flex; gap: 5px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

/* Tags */
.note-tag { font-size: 11px; color: #0066CC; background: #E8F4FD; padding: 2px 7px; border-radius: 6px; margin-top: 3px; display: inline-block; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.time-tag { font-size: 11px; color: var(--text2); background: var(--bg2); padding: 2px 7px; border-radius: 6px; white-space: nowrap; }
.absent-tag { font-size: 11px; padding: 2px 7px; border-radius: 6px; white-space: nowrap; }
.absent-excused { background: #E8F4FD; color: #0066CC; }
.absent-unexcused { background: #FFE5E5; color: #CC0000; }
.warn-inline { font-size: 10px; color: #7A4F00; background: #fff3cd; padding: 2px 6px; border-radius: 5px; }
.expire-inline { font-size: 10px; color: #8B0000; background: #FFE5E5; padding: 2px 6px; border-radius: 5px; }
.join-dur { font-size: 11px; color: #1B6B3A; background: #d4edda; padding: 2px 7px; border-radius: 6px; display: inline-block; margin-top: 2px; }

/* Student row */
.student-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
.student-row:last-child { border-bottom: none; }

/* History */
.hist-item { padding: 8px 0; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.hist-item:last-child { border-bottom: none; }

/* Class section header */
.cls-hd { display: flex; align-items: center; gap: 8px; padding: 8px 0 6px; border-bottom: 0.5px solid var(--border2); margin-bottom: 4px; font-size: 13px; font-weight: 600; color: var(--text); }

/* Empty state */
.empty { text-align: center; padding: 2rem; color: var(--text2); font-size: 14px; }

/* Forms */
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; font-size: 15px; padding: 10px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2);
  background: var(--bg2); color: var(--text); font-family: inherit;
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.expire-hint { font-size: 11px; color: #1B6B3A; margin-top: 3px; }

/* Overlay + modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; overflow-y: auto; padding: 1rem; }
.overlay.open { display: block; }
.modal { background: var(--bg); border-radius: var(--radius-lg); padding: 20px; width: 100%; max-width: 480px; margin: auto; margin-top: env(safe-area-inset-top, 20px); }
.modal-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
.modal-footer { display: flex; gap: 8px; margin-top: 16px; }
.modal-footer .btn { flex: 1; text-align: center; }

/* Confirm card */
.confirm-card { background: #fff; border-radius: 16px; padding: 24px 20px; max-width: 360px; margin: auto; margin-top: env(safe-area-inset-top, 20px); text-align: center; }

/* Toast */
#toast { position: fixed; bottom: calc(24px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 88vw; text-align: center; white-space: normal; }
#toast.show { opacity: 1; }
.tn { background: rgba(0,0,0,0.8); color: #fff; }
.tw { background: #FF9500; color: #fff; }
.td { background: #FF3B30; color: #fff; }

/* Add btn fab */
.fab { position: fixed; bottom: calc(20px + env(safe-area-inset-bottom,0px)); right: 20px; width: 52px; height: 52px; border-radius: 50%; background: #007AFF; color: #fff; font-size: 26px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(0,122,255,0.4); z-index: 40; border: none; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">健身課程管理</div>
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('checkin')">課堂簽到</button>
      <button class="tab" onclick="switchTab('students')">學員管理</button>
      <button class="tab" onclick="switchTab('history')">上課紀錄</button>
    </div>
  </div>

  <!-- 簽到 -->
  <div class="content" id="tab-checkin">
    <div id="alert-sessions"></div>
    <div id="alert-expire"></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">總學員數</div><div class="stat-num" id="st-total">0</div></div>
      <div class="stat-card"><div class="stat-label">堂數不足</div><div class="stat-num warn" id="st-low">0</div></div>
      <div class="stat-card"><div class="stat-label">即將到期</div><div class="stat-num danger" id="st-exp">0</div></div>
    </div>
    <div class="card">
      <div class="date-row">
        <div class="section-title" style="margin:0">選擇班別</div>
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-size:13px;color:var(--text2)">日期</label>
          <input type="date" id="checkin-date" onchange="renderCheckinList()" style="font-size:13px;padding:6px 10px;border-radius:8px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text)">
        </div>
      </div>
      <div class="chips" id="checkin-filter"></div>
      <div id="checkin-list"></div>
    </div>
  </div>

  <!-- 學員管理 -->
  <div class="content" id="tab-students" style="display:none">
    <div class="chips" id="student-filter"></div>
    <div id="student-list"></div>
    <button class="fab" onclick="openAddModal()">＋</button>
  </div>

  <!-- 上課紀錄 -->
  <div class="content" id="tab-history" style="display:none">
    <div class="card">
      <div class="section-title">上課紀錄</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<!-- 新增學員 -->
<div class="overlay" id="modal-add">
  <div class="modal">
    <div class="modal-title">新增學員</div>
    <div class="form-row">
      <div class="form-group"><label>姓名</label><input id="f-name" type="text" placeholder="王小明"></div>
      <div class="form-group"><label>電話</label><input id="f-phone" type="tel" placeholder="0912-345-678"></div>
    </div>
    <div class="form-group"><label>班別（可多選）</label><div id="f-cls" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div></div>
    <div class="form-group">
      <label>加入日期</label>
      <input id="f-join" type="date" onchange="showDur('f-join','f-join-out')">
      <div id="f-join-out"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>購買堂數</label><input id="f-total" type="number" min="1" value="12" onchange="autoExp()"></div>
      <div class="form-group"><label>購課日期</label><input id="f-buy" type="date" onchange="autoExp()"></div>
    </div>
    <div class="form-group">
      <label>到期日</label>
      <input id="f-exp" type="date">
      <div class="expire-hint" id="f-exp-hint"></div>
    </div>
    <div class="form-group"><label>特殊狀況備註</label><textarea id="f-note" placeholder="例如：左膝舊傷、需避免跳躍..."></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-add')">取消</button>
      <button class="btn btn-primary" onclick="addStudent()">確認新增</button>
    </div>
  </div>
</div>

<!-- 補購 -->
<div class="overlay" id="modal-purchase">
  <div class="modal">
    <div class="modal-title" id="pur-title">補購堂數</div>
    <div class="form-row">
      <div class="form-group"><label>追加堂數</label><input id="p-add" type="number" min="1" value="12" onchange="autoPurExp()"></div>
      <div class="form-group"><label>補購日期</label><input id="p-buy" type="date" onchange="autoPurExp()"></div>
    </div>
    <div class="form-group">
      <label>到期日</label>
      <input id="p-exp" type="date">
      <div class="expire-hint" id="p-exp-hint"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-purchase')">取消</button>
      <button class="btn btn-primary" onclick="confirmPurchase()">確認補購</button>
    </div>
  </div>
</div>

<!-- 編輯 -->
<div class="overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-title">編輯學員</div>
    <div class="form-row">
      <div class="form-group"><label>姓名</label><input id="e-name" type="text"></div>
      <div class="form-group"><label>電話</label><input id="e-phone" type="tel"></div>
    </div>
    <div class="form-group"><label>班別（可多選）</label><div id="e-cls" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div></div>
    <div class="form-group">
      <label>加入日期</label>
      <input id="e-join" type="date" onchange="showDur('e-join','e-join-out')">
      <div id="e-join-out"></div>
    </div>
    <div class="form-group"><label>特殊狀況備註</label><textarea id="e-note"></textarea></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-edit')">取消</button>
      <button class="btn btn-primary" onclick="confirmEdit()">儲存</button>
    </div>
  </div>
</div>

<!-- 簽到確認 -->
<div class="overlay" id="modal-confirm">
  <div class="confirm-card" id="confirm-snap">
    <div style="font-size:44px;margin-bottom:10px">✅</div>
    <div style="font-size:22px;font-weight:700;color:#111;margin-bottom:4px" id="cf-name"></div>
    <div style="font-size:14px;color:#666;margin-bottom:14px" id="cf-class"></div>
    <div style="border-top:1px solid #eee;padding-top:14px;margin-bottom:14px">
      <div style="font-size:13px;color:#888;margin-bottom:4px" id="cf-date"></div>
      <div style="font-size:28px;font-weight:700;color:#111;margin:6px 0" id="cf-remain"></div>
      <div style="font-size:12px;color:#888" id="cf-expire-txt"></div>
    </div>
    <div id="cf-warn" style="background:#FFF3CD;color:#7A4F00;border-radius:8px;padding:10px 12px;font-size:12px;margin-bottom:14px;text-align:left;display:none"></div>
    <div style="font-size:11px;color:#bbb;margin-bottom:16px">健身課程管理系統</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-green btn-sm" id="btn-shot" onclick="doShot()" style="flex:1;font-size:13px;padding:9px">截取畫面</button>
      <button class="btn btn-sm" onclick="closeModal('modal-confirm')" style="flex:1;font-size:13px;padding:9px">關閉</button>
    </div>
    <div id="shot-hint" style="font-size:11px;color:#888;margin-top:8px;display:none;text-align:center"></div>
  </div>
</div>

<!-- 個人紀錄 -->
<div class="overlay" id="modal-record">
  <div class="modal" id="record-snap">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px">
      <div>
        <div style="font-size:17px;font-weight:600;color:var(--text)" id="sr-name"></div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px" id="sr-meta"></div>
      </div>
      <button class="btn btn-sm btn-blue" onclick="doRecordShot()">截取</button>
    </div>
    <div class="stats-grid" style="margin-bottom:12px">
      <div class="stat-card"><div class="stat-label">購買堂數</div><div style="font-size:18px;font-weight:600;color:var(--text)" id="sr-total"></div></div>
      <div class="stat-card"><div class="stat-label">已使用</div><div style="font-size:18px;font-weight:600;color:var(--text)" id="sr-used"></div></div>
      <div class="stat-card"><div class="stat-label">剩餘堂數</div><div style="font-size:18px;font-weight:600" id="sr-remain"></div></div>
    </div>
    <div style="font-size:12px;margin-bottom:10px" id="sr-exp-info"></div>
    <div style="border-top:0.5px solid var(--border);padding-top:10px">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px">課堂明細</div>
      <div id="sr-records"></div>
    </div>
    <div style="margin-top:14px;text-align:right">
      <button class="btn btn-sm" onclick="closeModal('modal-record')">關閉</button>
    </div>
  </div>
</div>

<div id="toast" class="tn"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const KEY = 'fitness_ios_v1';
const CLS = [
  {id:'tue-wh',  name:'週二文化班',     color:'#534AB7', bg:'#EEEDFE'},
  {id:'thu-am',  name:'週四新昌上午班', color:'#0F6E56', bg:'#E1F5EE'},
  {id:'thu-pm',  name:'週四新昌下午班', color:'#185FA5', bg:'#E6F1FB'},
  {id:'fri-xs',  name:'週五秀山班',     color:'#993C1D', bg:'#FAECE7'},
  {id:'fri-ch',  name:'週五兒童班',     color:'#993556', bg:'#FBEAF0'},
];
const ERULES=[{s:4,d:42},{s:12,d:120},{s:20,d:180}];

function expDays(n){n=parseInt(n)||0;for(let i=ERULES.length-1;i>=0;i--)if(n>=ERULES[i].s)return ERULES[i].d;return 42;}
function expLbl(n){n=parseInt(n)||0;return n<=4?'6週':n<=12?'4個月':'6個月';}
function addD(s,d){const x=new Date(s);x.setDate(x.getDate()+d);return x.toISOString().slice(0,10);}
function diffD(s){const a=new Date(s),b=new Date();b.setHours(0,0,0,0);a.setHours(0,0,0,0);return Math.round((a-b)/86400000);}
function durStr(s){
  if(!s)return'';const st=new Date(s),now=new Date();now.setHours(0,0,0,0);st.setHours(0,0,0,0);
  if(now<st)return'';
  let y=now.getFullYear()-st.getFullYear(),m=now.getMonth()-st.getMonth(),d=now.getDate()-st.getDate();
  if(d<0){m--;const p=new Date(now.getFullYear(),now.getMonth(),0);d+=p.getDate();}
  if(m<0){y--;m+=12;}
  const p=[];if(y>0)p.push(y+'年');if(m>0)p.push(m+'個月');if(d>0)p.push(d+'天');
  return p.length?'已加入 '+p.join(' '):'今天加入';
}

let state={students:[],history:[]};
let purId=null,editId=null,addCls=[],editCls=[];
let selCI=CLS[0].id, selSF='all';

function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function load(){
  try{const r=localStorage.getItem(KEY);if(r)state=JSON.parse(r);}catch(e){}
  if(!state.students)state.students=[];
  if(!state.history)state.history=[];
  document.getElementById('checkin-date').value=new Date().toISOString().slice(0,10);
  renderAll();
}

function ini(n){if(!n)return'?';const t=n.trim();if(/[\u4e00-\u9fff]/.test(t))return t.slice(-2);return t.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function getCls(id){return CLS.find(c=>c.id===id);}
function isLow(s){return s.remainingSessions>0&&s.remainingSessions<=2;}
function isEmpty(s){return s.remainingSessions<=0;}
function isExpSoon(s){return s.expireDate&&diffD(s.expireDate)<=14;}
function isExpired(s){return s.expireDate&&diffD(s.expireDate)<0;}
function badgeInfo(s){
  if(isEmpty(s))return['badge-danger','已用完'];
  if(s.remainingSessions===1)return['badge-danger','最後1堂'];
  if(isLow(s))return['badge-warn','剩'+s.remainingSessions+'堂'];
  return['badge-ok','剩'+s.remainingSessions+'堂'];
}
function selDate(){return document.getElementById('checkin-date').value||new Date().toISOString().slice(0,10);}
function nowT(){return new Date().toTimeString().slice(0,5);}

function toast(msg,t){
  const el=document.getElementById('toast');el.textContent=msg;
  el.className=(t==='w'?'tw':t==='d'?'td':'tn')+' show';
  setTimeout(()=>el.classList.remove('show'),3000);
}
function openModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden';}
function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow='';}

function showDur(inId,outId){
  const v=document.getElementById(inId).value;const el=document.getElementById(outId);
  const t=durStr(v);el.innerHTML=t?`<span class="join-dur">${t}</span>`:'';
}
function autoExp(){
  const s=document.getElementById('f-total').value,b=document.getElementById('f-buy').value;
  const h=document.getElementById('f-exp-hint'),i=document.getElementById('f-exp');
  if(b){const sg=addD(b,expDays(s));i.value=sg;h.textContent='建議'+expLbl(s)+'內（'+sg+'）';}
}
function autoPurExp(){
  const s=document.getElementById('p-add').value,b=document.getElementById('p-buy').value;
  const h=document.getElementById('p-exp-hint'),i=document.getElementById('p-exp');
  if(b){const sg=addD(b,expDays(s));i.value=sg;h.textContent='建議'+expLbl(s)+'內（'+sg+'）';}
}

function renderAlerts(){
  const low=state.students.filter(s=>isLow(s)||isEmpty(s));
  const exp=state.students.filter(s=>isExpSoon(s)||isExpired(s));
  const clsStr=s=>(s.classIds||[]).map(id=>{const c=getCls(id);return c?c.name:'';}).filter(Boolean).join('、')||'未分班';
  document.getElementById('alert-sessions').innerHTML=low.length?
    `<div class="alert alert-warn"><div class="alert-title">堂數不足（${low.length}位）</div>${low.map(s=>`<div class="alert-item"><span class="alert-dot"></span><b>${s.name}</b>（${clsStr(s)}）— ${isEmpty(s)?'已用完':s.remainingSessions===1?'本次上完需補購':'剩'+s.remainingSessions+'堂'}</div>`).join('')}</div>`:'';
  document.getElementById('alert-expire').innerHTML=exp.length?
    `<div class="alert alert-danger"><div class="alert-title">課程到期提醒（${exp.length}位）</div>${exp.map(s=>{const d=diffD(s.expireDate);return`<div class="alert-item"><span class="alert-dot"></span><b>${s.name}</b>（${clsStr(s)}）— ${d<0?'已過期'+Math.abs(d)+'天':d===0?'今天到期':d+'天後到期'}（${s.expireDate}）</div>`;}).join('')}</div>`:'';
}

function chips(cid,selIds,fn){
  const el=document.getElementById(cid);
  el.innerHTML=CLS.map(c=>{const a=selIds.includes(c.id);return`<label style="display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:0.5px solid ${a?c.color:'var(--border2)'};background:${a?c.bg:'var(--bg)'};cursor:pointer;font-size:13px;color:${a?c.color:'var(--text2)'}"><input type="checkbox" style="display:none" ${a?'checked':''} onchange="${fn}('${c.id}',this.checked)">${c.name}</label>`;}).join('');
}
function togA(id,v){if(v)addCls.push(id);else addCls=addCls.filter(x=>x!==id);chips('f-cls',addCls,'togA');}
function togE(id,v){if(v)editCls.push(id);else editCls=editCls.filter(x=>x!==id);chips('e-cls',editCls,'togE');}

function renderCheckinFilter(){
  document.getElementById('checkin-filter').innerHTML=CLS.map(c=>{
    const a=selCI===c.id;
    return`<button class="chip" onclick="setCI('${c.id}')" style="background:${a?c.color:'var(--bg)'};color:${a?'#fff':c.color};border-color:${c.color}">${c.name}</button>`;
  }).join('');
}
function renderStudentFilter(){
  const allA=selSF==='all';
  document.getElementById('student-filter').innerHTML=
    `<button class="chip" onclick="setSF('all')" style="background:${allA?'#007AFF':'var(--bg)'};color:${allA?'#fff':'var(--text2)'};border-color:${allA?'#007AFF':'var(--border2)'}">全部</button>`+
    CLS.map(c=>{const a=selSF===c.id;return`<button class="chip" onclick="setSF('${c.id}')" style="background:${a?c.color:'var(--bg)'};color:${a?'#fff':c.color};border-color:${c.color}">${c.name}</button>`;}).join('');
}
function setCI(id){selCI=id;renderCheckinFilter();renderCheckinList();}
function setSF(id){selSF=id;renderStudentFilter();renderStudentList();}

function getRec(sid,cid,date){return[...state.history].reverse().find(h=>h.studentId===sid&&h.classId===cid&&h.date===date);}

function renderCheckinList(){
  const el=document.getElementById('checkin-list');
  const cls=getCls(selCI);const date=selDate();
  const members=state.students.filter(s=>s.classIds&&s.classIds.includes(selCI));
  if(!members.length){el.innerHTML=`<div class="empty">此班級尚無學員</div>`;return;}
  el.innerHTML=members.map(s=>{
    const rec=getRec(s.id,selCI,date);
    const [bc,bt]=badgeInfo(s);
    const low=(isLow(s)||isEmpty(s))&&!rec;
    const eW=isExpSoon(s)||isExpired(s);
    const noteH=s.note?`<div class="note-tag">📋 ${s.note}</div>`:'';
    let expT='';if(eW&&s.expireDate){const d=diffD(s.expireDate);expT=` <span class="expire-inline">${d<0?'已過期':d===0?'今日到期':d+'天後到期'}</span>`;}
    let sc=low?'low-bg':'';
    let acts='';
    if(!rec){
      acts=(isEmpty(s)?`<button class="btn btn-sm" disabled style="opacity:0.4;font-size:11px">堂數用完</button>`:`<button class="btn btn-primary btn-sm" onclick="doCI('${s.id}','${selCI}')">簽到</button>`)+
        `<button class="btn btn-blue btn-sm" onclick="markAbs('${s.id}','${selCI}','excused')">請假</button>`+
        `<button class="btn btn-red btn-sm" onclick="markAbs('${s.id}','${selCI}','unexcused')">未到</button>`;
    }else if(rec.type==='checkin'){sc='';acts=`<span class="time-tag">✅ ${rec.time}</span><button class="btn btn-sm" style="font-size:11px" onclick="cancelRec('${s.id}','${selCI}','${date}')">取消</button>`;}
    else if(rec.type==='excused'){sc='excused-bg';acts=`<span class="absent-tag absent-excused">請假（不扣）</span><button class="btn btn-sm" style="font-size:11px" onclick="cancelRec('${s.id}','${selCI}','${date}')">取消</button>`;}
    else if(rec.type==='unexcused'){sc='unexcused-bg';acts=`<span class="absent-tag absent-unexcused">未到（扣堂）</span><button class="btn btn-sm" style="font-size:11px" onclick="cancelRec('${s.id}','${selCI}','${date}')">取消</button>`;}
    return`<div class="check-item ${sc}">
      <div style="display:flex;align-items:flex-start;gap:10px;flex:1;min-width:0">
        <div class="avatar" style="background:${cls.bg};color:${cls.color};margin-top:1px">${ini(s.name)}</div>
        <div style="min-width:0">
          <div style="font-size:14px;font-weight:600;color:var(--text)">${s.name} <span class="badge ${bc}">${bt}</span>${s.remainingSessions===1&&!rec?' <span class="warn-inline">本次上完需補購</span>':''}${expT}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${s.phone||''}</div>
          ${noteH}
        </div>
      </div>
      <div class="check-actions">${acts}</div>
    </div>`;
  }).join('');
}

function renderStudentRow(s){
  const [bc,bt]=badgeInfo(s);
  const tags=(s.classIds||[]).map(id=>{const c=getCls(id);return c?`<span style="font-size:10px;padding:1px 6px;border-radius:10px;background:${c.bg};color:${c.color}">${c.name}</span>`:''}).join('');
  const noteH=s.note?`<div class="note-tag" style="margin-top:3px;max-width:170px">📋 ${s.note}</div>`:'';
  const joinH=s.joinDate?`<div class="join-dur" style="margin-top:3px">${durStr(s.joinDate)}</div>`:'';
  let expH='';
  if(s.expireDate){const d=diffD(s.expireDate);const col=d<0?'#FF3B30':d<=14?'#FF9500':'var(--text2)';expH=`<div style="font-size:11px;color:${col};margin-top:2px">📅 ${d<0?'已過期'+Math.abs(d)+'天':d===0?'今天到期':d+'天後到期（'+s.expireDate+'）'}</div>`;}
  return`<div class="student-row">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:14px;font-weight:600;color:var(--text)">${s.name}<span class="badge ${bc}">${bt}</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:3px">${tags}</div>
      ${noteH}${joinH}
      <div style="font-size:11px;color:var(--text2);margin-top:3px">剩餘 ${s.remainingSessions} / ${s.totalSessions} 堂</div>
      ${expH}${s.phone?`<div style="font-size:11px;color:var(--text2)">${s.phone}</div>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0;margin-left:8px">
      <button class="btn btn-sm btn-blue" onclick="openRecord('${s.id}')">課堂紀錄</button>
      <button class="btn btn-sm" onclick="openEdit('${s.id}')">編輯</button>
      <button class="btn btn-sm ${isLow(s)||isEmpty(s)?'btn-warn':''}" onclick="openPur('${s.id}')">補購</button>
    </div>
  </div>`;
}

function renderStudentList(){
  const el=document.getElementById('student-list');
  let f=state.students;
  if(selSF!=='all')f=f.filter(s=>s.classIds&&s.classIds.includes(selSF));
  if(!f.length){el.innerHTML=`<div class="card"><div class="empty">${selSF==='all'?'尚無學員，請按右下角＋新增':'此班級尚無學員'}</div></div>`;return;}
  if(selSF==='all'){
    let html='';
    CLS.forEach(cls=>{const m=f.filter(s=>s.classIds&&s.classIds.includes(cls.id));if(!m.length)return;
      html+=`<div class="cls-hd"><span style="width:8px;height:8px;border-radius:50%;background:${cls.color};display:inline-block"></span>${cls.name}<span style="font-size:11px;color:var(--text2);font-weight:400">${m.length}人</span></div><div class="card" style="padding:0.25rem 1rem;margin-bottom:14px">`+m.map(s=>renderStudentRow(s)).join('')+`</div>`;
    });
    const nc=f.filter(s=>!s.classIds||s.classIds.length===0);
    if(nc.length)html+=`<div class="cls-hd"><span style="width:8px;height:8px;border-radius:50%;background:var(--text2);display:inline-block"></span>未分班<span style="font-size:11px;color:var(--text2);font-weight:400">${nc.length}人</span></div><div class="card" style="padding:0.25rem 1rem;margin-bottom:14px">`+nc.map(s=>renderStudentRow(s)).join('')+`</div>`;
    el.innerHTML=html||`<div class="card"><div class="empty">尚無學員</div></div>`;
  }else{el.innerHTML=`<div class="card" style="padding:0.25rem 1rem">`+f.map(s=>renderStudentRow(s)).join('')+`</div>`;}
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!state.history.length){el.innerHTML='<div class="empty">尚無紀錄</div>';return;}
  const tl={checkin:'✅ 簽到',excused:'🔵 請假',unexcused:'🔴 未到扣堂'};
  el.innerHTML=[...state.history].reverse().slice(0,60).map(h=>{
    const s=state.students.find(x=>x.id===h.studentId);const cls=getCls(h.classId);
    return`<div class="hist-item">
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;color:var(--text)">${s?s.name:'已刪除學員'}${cls?`<span style="font-size:10px;padding:1px 5px;border-radius:8px;background:${cls.bg};color:${cls.color};margin-left:4px">${cls.name}</span>`:''}<span style="font-size:11px;color:var(--text2);margin-left:4px">${tl[h.type]||'✅ 簽到'}</span></div>
        <div style="font-size:12px;color:var(--text2)">${h.date} ${h.time}</div>
      </div>
      <div style="font-size:12px;color:var(--text2);white-space:nowrap">剩 ${h.remainingAfter} 堂</div>
    </div>`;
  }).join('');
}

function renderStats(){
  document.getElementById('st-total').textContent=state.students.length;
  document.getElementById('st-low').textContent=state.students.filter(s=>isLow(s)||isEmpty(s)).length;
  document.getElementById('st-exp').textContent=state.students.filter(s=>isExpSoon(s)||isExpired(s)).length;
}

function renderAll(){renderAlerts();renderCheckinFilter();renderStudentFilter();renderCheckinList();renderStudentList();renderHistory();renderStats();}

function switchTab(t){
  ['checkin','students','history'].forEach(x=>document.getElementById('tab-'+x).style.display=x===t?'':'none');
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['checkin','students','history'][i]===t));
}

function openAddModal(){
  addCls=[];['f-name','f-phone','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-total').value='12';document.getElementById('f-exp').value='';document.getElementById('f-exp-hint').textContent='';document.getElementById('f-join-out').innerHTML='';
  const d=new Date().toISOString().slice(0,10);
  document.getElementById('f-buy').value=d;document.getElementById('f-join').value=d;
  chips('f-cls',addCls,'togA');autoExp();showDur('f-join','f-join-out');
  openModal('modal-add');
}
function addStudent(){
  const name=document.getElementById('f-name').value.trim();if(!name){toast('請輸入姓名');return;}
  const total=parseInt(document.getElementById('f-total').value)||12;
  state.students.push({id:Date.now().toString(),name,phone:document.getElementById('f-phone').value.trim(),classIds:[...addCls],joinDate:document.getElementById('f-join').value,totalSessions:total,remainingSessions:total,buyDate:document.getElementById('f-buy').value,expireDate:document.getElementById('f-exp').value,note:document.getElementById('f-note').value.trim()});
  save();renderAll();closeModal('modal-add');toast('學員已新增');
}
function openEdit(id){
  const s=state.students.find(x=>x.id===id);if(!s)return;
  editId=id;editCls=[...(s.classIds||[])];
  document.getElementById('e-name').value=s.name;document.getElementById('e-phone').value=s.phone||'';document.getElementById('e-note').value=s.note||'';document.getElementById('e-join').value=s.joinDate||'';
  chips('e-cls',editCls,'togE');showDur('e-join','e-join-out');
  openModal('modal-edit');
}
function confirmEdit(){
  const s=state.students.find(x=>x.id===editId);if(!s)return;
  s.name=document.getElementById('e-name').value.trim()||s.name;s.phone=document.getElementById('e-phone').value.trim();s.classIds=[...editCls];s.note=document.getElementById('e-note').value.trim();s.joinDate=document.getElementById('e-join').value;
  save();renderAll();closeModal('modal-edit');toast('學員資料已更新');
}
function openPur(id){
  purId=id;const s=state.students.find(x=>x.id===id);
  document.getElementById('pur-title').textContent='補購堂數 — '+(s?s.name:'');
  document.getElementById('p-add').value='12';document.getElementById('p-exp').value='';document.getElementById('p-exp-hint').textContent='';
  document.getElementById('p-buy').value=new Date().toISOString().slice(0,10);
  autoPurExp();openModal('modal-purchase');
}
function confirmPurchase(){
  const s=state.students.find(x=>x.id===purId);if(!s)return;
  const add=parseInt(document.getElementById('p-add').value)||0;
  s.totalSessions+=add;s.remainingSessions+=add;s.expireDate=document.getElementById('p-exp').value;
  save();renderAll();closeModal('modal-purchase');toast('已追加'+add+'堂');
}

function showConfirm(s,classId){
  const cls=getCls(classId);
  document.getElementById('cf-name').textContent=s.name+' 簽到成功！';
  document.getElementById('cf-class').textContent=cls?cls.name:'';
  document.getElementById('cf-date').textContent=selDate()+' '+nowT();
  document.getElementById('cf-remain').textContent='剩餘 '+s.remainingSessions+' 堂';
  document.getElementById('cf-expire-txt').textContent=s.expireDate?'課程到期日：'+s.expireDate:'';
  const w=document.getElementById('cf-warn');
  if(isEmpty(s)){w.textContent='⚠ 堂數已全數用完，請盡快補購！';w.style.display='block';}
  else if(s.remainingSessions===1){w.textContent='⚠ 下次上課前請記得補購堂數！';w.style.display='block';}
  else if(isLow(s)){w.textContent='⚠ 堂數僅剩'+s.remainingSessions+'堂，建議盡快補購。';w.style.display='block';}
  else{w.style.display='none';}
  document.getElementById('shot-hint').style.display='none';
  document.getElementById('btn-shot').textContent='截取畫面';
  document.getElementById('btn-shot').disabled=false;
  openModal('modal-confirm');
}

function doShot(){
  const el=document.getElementById('confirm-snap');
  const btn=document.getElementById('btn-shot');
  const hint=document.getElementById('shot-hint');
  btn.textContent='截取中...';btn.disabled=true;
  html2canvas(el,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false}).then(canvas=>{
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;
      a.download='簽到確認_'+new Date().toISOString().slice(0,16).replace('T','_')+'.png';
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      btn.textContent='截取畫面';btn.disabled=false;
      hint.textContent='圖片已儲存，可在「檔案」App或「照片」中找到';hint.style.display='block';
    });
  }).catch(()=>{btn.textContent='截取畫面';btn.disabled=false;hint.textContent='截圖失敗，請手動截圖（側鍵+音量鍵）';hint.style.display='block';});
}

function openRecord(id){
  const s=state.students.find(x=>x.id===id);if(!s)return;
  document.getElementById('sr-name').textContent=s.name;
  const tags=(s.classIds||[]).map(id2=>{const c=getCls(id2);return c?c.name:'';}).filter(Boolean).join('、')||'未分班';
  let meta=tags;if(s.joinDate){const dur=durStr(s.joinDate);if(dur)meta+=' ・ '+dur;}
  document.getElementById('sr-meta').textContent=meta;
  document.getElementById('sr-total').textContent=s.totalSessions;
  document.getElementById('sr-used').textContent=s.totalSessions-s.remainingSessions;
  const rem=document.getElementById('sr-remain');rem.textContent=s.remainingSessions;rem.style.color=isEmpty(s)?'#FF3B30':isLow(s)?'#FF9500':'var(--text)';
  const expEl=document.getElementById('sr-exp-info');
  if(s.expireDate){const d=diffD(s.expireDate);const col=d<0?'#FF3B30':d<=14?'#FF9500':'var(--text2)';expEl.innerHTML=`<span style="color:${col}">📅 課程到期日：${s.expireDate}（${d<0?'已過期'+Math.abs(d)+'天':d===0?'今天到期':d+'天後到期'}）</span>`;}else{expEl.textContent='';}
  const recs=state.history.filter(h=>h.studentId===id).reverse();
  const tl={checkin:'✅ 簽到',excused:'🔵 請假（不扣堂）',unexcused:'🔴 未到（已扣堂）'};
  const recEl=document.getElementById('sr-records');
  if(!recs.length){recEl.innerHTML='<div style="font-size:13px;color:var(--text2);padding:8px 0">尚無上課紀錄</div>';}
  else{
    recEl.innerHTML=recs.map(h=>{const cls=getCls(h.classId);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border);font-size:13px">
      <div><span style="color:var(--text)">${h.date}</span>${cls?`<span style="font-size:10px;padding:1px 5px;border-radius:8px;background:${cls.bg};color:${cls.color};margin-left:5px">${cls.name}</span>`:''}<span style="color:var(--text2);font-size:11px;margin-left:4px">${tl[h.type]||'✅ 簽到'}</span></div>
      <div style="color:var(--text2);font-size:12px">剩 ${h.remainingAfter} 堂</div>
    </div>`;}).join('')+
    `<div style="font-size:11px;color:var(--text2);padding-top:6px">共 ${recs.filter(h=>h.type==='checkin').length} 次到課・${recs.filter(h=>h.type==='excused').length} 次請假・${recs.filter(h=>h.type==='unexcused').length} 次未到</div>`;
  }
  openModal('modal-record');
}

function doRecordShot(){
  const el=document.getElementById('record-snap');
  html2canvas(el,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false}).then(canvas=>{
    canvas.toBlob(blob=>{
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download='課堂紀錄_'+new Date().toISOString().slice(0,10)+'.png';
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      toast('課堂紀錄已儲存');
    });
  }).catch(()=>toast('截圖失敗，請手動截圖','w'));
}

function doCI(studentId,classId){
  const s=state.students.find(x=>x.id===studentId);
  if(!s||isEmpty(s)){toast('堂數已用完','d');return;}
  s.remainingSessions-=1;
  state.history.push({studentId,classId,date:selDate(),time:nowT(),type:'checkin',remainingAfter:s.remainingSessions});
  save();renderAll();showConfirm(s,classId);
}
function markAbs(studentId,classId,type){
  const s=state.students.find(x=>x.id===studentId);if(!s)return;
  if(type==='unexcused'&&!isEmpty(s))s.remainingSessions-=1;
  state.history.push({studentId,classId,date:selDate(),time:nowT(),type,remainingAfter:s.remainingSessions});
  save();renderAll();
  toast(type==='excused'?s.name+' 請假，不扣堂':s.name+' 未到，已扣1堂',type==='unexcused'?'w':'');
}
function cancelRec(studentId,classId,date){
  const s=state.students.find(x=>x.id===studentId);if(!s)return;
  const result=[...state.history].map((h,i)=>({h,i})).reverse().find(({h})=>h.studentId===studentId&&h.classId===classId&&h.date===date);
  if(!result)return;
  const rec=state.history[result.i];
  if(rec.type==='checkin'||rec.type==='unexcused')s.remainingSessions+=1;
  state.history.splice(result.i,1);
  save();renderAll();toast('已取消記錄');
}

load();
</script>
